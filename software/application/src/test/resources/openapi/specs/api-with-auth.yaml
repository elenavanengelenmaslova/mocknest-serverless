openapi: 3.0.0
info:
  title: Auth API
  version: 1.0.0
paths:
  /profile:
    get:
      operationId: getProfile
      summary: Get current user profile
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthorized
  /profile/settings:
    put:
      operationId: updateSettings
      summary: Update profile settings
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Request-ID
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notifications:
                  type: boolean
                theme:
                  type: string
      responses:
        '200':
          description: Updated
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
components:
  schemas:
    Profile:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
