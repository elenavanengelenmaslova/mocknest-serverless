openapi: 3.0.0
info:
  title: File Upload API
  version: 1.0.0
paths:
  /files:
    get:
      operationId: listFiles
      summary: List uploaded files
      responses:
        '200':
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileMetadata'
    post:
      operationId: uploadFile
      summary: Upload a file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
  /files/{fileId}:
    get:
      operationId: getFile
      summary: Get file metadata
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '404':
          description: File not found
    delete:
      operationId: deleteFile
      summary: Delete a file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: File deleted
components:
  schemas:
    FileMetadata:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        size:
          type: integer
        contentType:
          type: string
        uploadedAt:
          type: string
          format: date-time
