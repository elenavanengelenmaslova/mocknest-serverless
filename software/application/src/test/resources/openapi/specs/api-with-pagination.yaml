openapi: 3.0.0
info:
  title: Paginated API
  version: 1.0.0
paths:
  /items:
    get:
      operationId: listItems
      summary: List items with pagination
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
components:
  schemas:
    Item:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
