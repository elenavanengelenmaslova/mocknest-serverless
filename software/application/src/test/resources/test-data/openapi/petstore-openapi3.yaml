openapi: 3.0.3
info:
  title: Pet Store API
  version: 2.0.0
  description: A minimal pet store API for testing endpoint extraction
servers:
  - url: https://api.petstore.example.com/v2
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePetRequest'
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /pets/{petId}:
    get:
      operationId: getPetById
      summary: Get a pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A single pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique pet identifier
        name:
          type: string
        species:
          type: string
          enum:
            - dog
            - cat
            - bird
        status:
          type: string
          enum:
            - available
            - adopted
            - pending
          nullable: true
    CreatePetRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        species:
          type: string
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
