# Generation Lambda configuration
spring.profiles.include=core
aws.region=${MOCKNEST_APP_REGION:${AWS_REGION:eu-west-1}}
bedrock.inference.prefix=${BEDROCK_INFERENCE_PREFIX:eu}
bedrock.model.name=${BEDROCK_MODEL_NAME:AmazonNovaPro}
bedrock.generation.maxRetries=${BEDROCK_GENERATION_MAX_RETRIES:1}

# Spring Cloud Function configuration
spring.cloud.function.definition=generationRouter

# S3 Configuration
mocknest.s3.bucket-name=${MOCKNEST_S3_BUCKET_NAME:mocknest-serverless-storage}
storage.bucket.name=${mocknest.s3.bucket-name}

# Logging configuration
logging.level.nl.vintik.mocknest.infra.aws.generation=DEBUG
