# Test profile for generation module
aws.region=${MOCKNEST_APP_REGION:${AWS_REGION:eu-west-1}}
bedrock.inference.prefix=${BEDROCK_INFERENCE_PREFIX:eu}
bedrock.model.name=${BEDROCK_MODEL_NAME:AmazonNovaPro}
bedrock.generation.maxRetries=${BEDROCK_GENERATION_MAX_RETRIES:1}

# S3 Configuration for testing
storage.bucket.name=${MOCKNEST_S3_BUCKET_NAME:test-bucket}

# Disable AWS SDK retries for faster test execution
aws.sdk.s3.retry.maxAttempts=1

# Logging for tests
logging.level.nl.vintik.mocknest=DEBUG
logging.level.aws.sdk.kotlin=WARN
logging.level.org.testcontainers=INFO
