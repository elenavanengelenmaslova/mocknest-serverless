# MockNest Serverless unified configuration
spring.profiles.include=core

# S3 Configuration
storage.bucket.name=${MOCKNEST_S3_BUCKET_NAME:mocknest-serverless-storage}
mocknest.s3.bucket-name=${storage.bucket.name}

# Bedrock AI Configuration
bedrock.inference.prefix=${BEDROCK_INFERENCE_PREFIX:eu}
bedrock.model.name=${BEDROCK_MODEL_NAME:AmazonNovaPro}
bedrock.generation.maxRetries=${BEDROCK_GENERATION_MAX_RETRIES:1}

# Spring Cloud Function configuration
# Note: This will be overridden by Lambda environment variable SPRING_CLOUD_FUNCTION_DEFINITION
# Runtime Lambda uses: runtimeRouter
# Generation Lambda uses: generationRouter
spring.cloud.function.definition=${SPRING_CLOUD_FUNCTION_DEFINITION:runtimeRouter}

# Logging configuration
logging.level.nl.vintik.mocknest.infra.aws.runtime=INFO
logging.level.nl.vintik.mocknest.infra.aws.generation=INFO
logging.level.nl.vintik.mocknest.infra.aws.core=INFO
