# Allow bean definition overriding for test configurations
spring.main.allow-bean-definition-overriding=true

# Disable Spring Cloud Function web support for tests
spring.cloud.function.web.export.enabled=false

# Test-specific logging
logging.level.io.mocknest=DEBUG
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN

# S3 Configuration (matching application.properties for testing resolution)
aws.s3.bucket-name=${MOCKNEST_S3_BUCKET_NAME:mocknest-serverless-storage}

# Disable unnecessary Spring Boot features for tests
spring.jmx.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration
