AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MockNest Serverless - AWS-native serverless mock runtime

Parameters:
  DeploymentName:
    Type: String
    Default: 'mocks'
    Description: Deployment instance identifier for this MockNest installation (e.g., team-alpha, payment-apis, test, mocks)
    AllowedPattern: '^[a-zA-Z0-9\\-_]+$'
    ConstraintDescription: Stage name must contain only alphanumeric characters, hyphens, and underscores

  BucketName:
    Type: String
    Default: ''
    Description: Custom S3 bucket name for mock storage (optional, auto-generated if empty)

  LambdaMemorySize:
    Type: Number
    Default: "1024"
    MinValue: "512"
    MaxValue: "10240"
    Description: Lambda function memory size in MB

  LambdaTimeout:
    Type: Number
    Default: "120"
    MinValue: "3"
    MaxValue: "900"
    Description: Lambda function timeout in seconds

  BedrockModelName:
    Type: String
    Default: 'AmazonNovaPro'
    Description: |
      Bedrock model name for AI-powered mock generation.
      Choose from available Claude, Nova, Jamba, or Llama models.
      See https://docs.aws.amazon.com/bedrock/latest/userguide/models-supported.html for details.
    AllowedValues:
      # Claude 4.5 models
      - AnthropicClaude45Opus
      - AnthropicClaude4_5Sonnet
      - AnthropicClaude4_5Haiku
      # Claude 4 models
      - AnthropicClaude4Opus
      - AnthropicClaude41Opus
      - AnthropicClaude4Sonnet
      # Claude 3.5 models
      - AnthropicClaude35SonnetV2
      - AnthropicClaude35Haiku
      # Claude 3 models
      - AnthropicClaude3Opus
      - AnthropicClaude3Sonnet
      - AnthropicClaude3Haiku
      - AnthropicClaude21
      - AnthropicClaudeInstant
      # Amazon Nova models
      - AmazonNovaMicro
      - AmazonNovaLite
      - AmazonNovaPro
      - AmazonNovaPremier
      # AI21 Jamba models
      - AI21JambaLarge
      - AI21JambaMini
      # Meta Llama models
      - MetaLlama3_0_8BInstruct
      - MetaLlama3_0_70BInstruct
      - MetaLlama3_1_8BInstruct
      - MetaLlama3_1_70BInstruct
      - MetaLlama3_1_405BInstruct
      - MetaLlama3_2_1BInstruct
      - MetaLlama3_2_3BInstruct
      - MetaLlama3_2_11BInstruct
      - MetaLlama3_2_90BInstruct
      - MetaLlama3_3_70BInstruct
    ConstraintDescription: Must be a valid BedrockModels constant name

  BedrockInferencePrefix:
    Type: String
    Default: 'eu'
    Description: |
      Bedrock inference profile prefix for cross-region routing.
      Use 'eu' for Europe, 'us' for USA.
      Note: Nova models require 'eu' or 'us' prefix for cross-region access.
    AllowedValues:
      - global
      - us
      - ca
      - mx
      - af
      - ap
      - eu
      - il
      - me
      - sa

  BedrockGenerationMaxRetries:
    Type: Number
    Default: 1
    Description: Maximum number of retry attempts for AI mock generation if validation fails.

  AppRegion:
    Type: String
    Default: 'eu-west-1'
    Description: AWS region for deployment and Bedrock access.

Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref BucketName, '']]

Globals:
  Function:
    Runtime: java25
    MemorySize: !Ref LambdaMemorySize
    Timeout: !Ref LambdaTimeout
    Environment:
      Variables:
        SPRING_PROFILES_ACTIVE: aws

Resources:
  # S3 bucket for mock definitions and response payloads
  MockStorage:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasCustomBucketName
        - !Ref BucketName
        - !Ref AWS::NoValue
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # IAM Role for Lambda function
  MockNestLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: MockNestS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt MockStorage.Arn
                  - !Sub "${MockStorage.Arn}/*"

              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt MockNestDLQ.Arn

        - PolicyName: MockNestBedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ListFoundationModels
                Resource: "*"
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # Dead Letter Queue for failed Lambda invocations
  MockNestDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-dlq"
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # CloudWatch Log Group for API Gateway
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}"
      RetentionInDays: 30
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # API Gateway REST API
  MockNestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      StageName: !Ref DeploymentName
      TracingEnabled: true
      OpenApiVersion: '3.0.1'
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingBurstLimit: 200
          ThrottlingRateLimit: 100
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: '{"requestId":"$context.requestId","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","path":"$context.path","resourcePath":"$context.resourcePath","status":$context.status,"responseLength":$context.responseLength,"responseTime":$context.responseTime,"userAgent":"$context.identity.userAgent","sourceIp":"$context.identity.sourceIp"}'
      Tags:
        Application: MockNest-Serverless

  # API Key for authentication
  MockNestApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: MockNestApiStage
    Properties:
      Name: !Sub "${AWS::StackName}-api-key"
      Description: API key for MockNest Serverless access
      Enabled: true
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # Usage Plan for API throttling and quotas
  MockNestUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: MockNestApiStage
    Properties:
      UsagePlanName: !Sub "${AWS::StackName}-usage-plan"
      Description: Usage plan for MockNest Serverless API
      ApiStages:
        - ApiId: !Ref MockNestApi
          Stage: !Ref DeploymentName
      Throttle:
        BurstLimit: 200
        RateLimit: 100
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # Associate API Key with Usage Plan
  MockNestUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref MockNestApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref MockNestUsagePlan

  # Lambda function for MockNest Serverless runtime
  MockNestRuntimeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-runtime"
      CodeUri: ../../../build/dist/mocknest-runtime.jar
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Role: !GetAtt MockNestLambdaRole.Arn
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          MOCKNEST_APP_REGION: !Ref AppRegion
          MOCK_STORAGE_BUCKET: !Ref MockStorage
          MOCKNEST_S3_BUCKET_NAME: !Ref MockStorage
          SPRING_CLOUD_FUNCTION_DEFINITION: "runtimeRouter"
          MAIN_CLASS: "nl.vintik.mocknest.infra.aws.runtime.RuntimeApplication"
          JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt MockNestDLQ.Arn
      Tags:
        Application: MockNest-Serverless
        Component: Runtime
      Events:
        AdminRoutes:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestApi
            Path: /__admin/{proxy+}
            Method: ANY
            Auth:
              ApiKeyRequired: true
        MockRoutes:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestApi
            Path: /mocknest/{proxy+}
            Method: ANY
            Auth:
              ApiKeyRequired: true

  # Lambda function for MockNest Generation
  MockNestGenerationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-generation"
      CodeUri: ../../../build/dist/mocknest-generation.jar
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Role: !GetAtt MockNestLambdaRole.Arn
      ReservedConcurrentExecutions: 5
      Timeout: 300
      Environment:
        Variables:
          MOCKNEST_APP_REGION: !Ref AppRegion
          MOCK_STORAGE_BUCKET: !Ref MockStorage
          MOCKNEST_S3_BUCKET_NAME: !Ref MockStorage
          SPRING_CLOUD_FUNCTION_DEFINITION: "generationRouter"
          MAIN_CLASS: "nl.vintik.mocknest.infra.aws.generation.GenerationApplication"
          JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
          MOCKNEST_BEDROCK_MODEL_NAME: !Ref BedrockModelName
          MOCKNEST_BEDROCK_INFERENCE_PREFIX: !Ref BedrockInferencePrefix
          MOCKNEST_BEDROCK_GENERATION_MAX_RETRIES: !Ref BedrockGenerationMaxRetries
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt MockNestDLQ.Arn
      Tags:
        Application: MockNest-Serverless
        Component: Generation
      Events:
        AIRoutes:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestApi
            Path: /ai/{proxy+}
            Method: ANY
            Auth:
              ApiKeyRequired: true

  # CloudWatch Log Group for Runtime Lambda
  RuntimeLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-runtime"
      RetentionInDays: 30
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # CloudWatch Log Group for Generation Lambda
  GenerationLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-generation"
      RetentionInDays: 30
      Tags:
        - Key: Application
          Value: MockNest-Serverless

Outputs:
  MockNestApiUrl:
    Description: "API Gateway endpoint URL for MockNest Serverless"
    Value: !Sub "https://${MockNestApi}.execute-api.${AWS::Region}.amazonaws.com/${DeploymentName}/"
    Export:
      Name: !Sub "${AWS::StackName}-api-url"

  MockNestApiId:
    Description: "API Gateway API ID for MockNest Serverless"
    Value: !Ref MockNestApi
    Export:
      Name: !Sub "${AWS::StackName}-api-id"

  MockStorageBucket:
    Description: "S3 bucket for mock storage"
    Value: !Ref MockStorage
    Export:
      Name: !Sub "${AWS::StackName}-storage-bucket"

  MockNestRuntimeFunctionName:
    Description: "Lambda function name for MockNest runtime"
    Value: !Ref MockNestRuntimeFunction
    Export:
      Name: !Sub "${AWS::StackName}-runtime-function-name"

  MockNestGenerationFunctionName:
    Description: "Lambda function name for MockNest generation"
    Value: !Ref MockNestGenerationFunction
    Export:
      Name: !Sub "${AWS::StackName}-generation-function-name"

  Region:
    Description: "AWS region where MockNest is deployed"
    Value: !Ref "AWS::Region"
    Export:
      Name: !Sub "${AWS::StackName}-region"

  DeploymentName:
    Description: "Deployment instance identifier"
    Value: !Ref DeploymentName
    Export:
      Name: !Sub "${AWS::StackName}-deployment-name"

  StackName:
    Description: "CloudFormation stack name"
    Value: !Ref "AWS::StackName"
    Export:
      Name: !Sub "${AWS::StackName}-stack-name"

  MockNestApiKey:
    Description: "API key for accessing MockNest Serverless endpoints (use with x-api-key header)"
    Value: !GetAtt MockNestApiKey.APIKeyId
    Export:
      Name: !Sub "${AWS::StackName}-api-key"
