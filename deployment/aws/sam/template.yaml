AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MockNest Serverless - AWS-native serverless mock runtime

Metadata:
  AWS::ServerlessRepo::Application:
    Name: MockNest-Serverless
    Description: "AWS-native serverless mock runtime with WireMock, S3 persistence, AI-powered generation via Bedrock, and support for REST, SOAP, and GraphQL APIs. Early release - feedback welcome!"
    Author: Elena van Engelen - Maslova
    SemanticVersion: ${version}
    LicenseUrl: ../../../LICENSE
    ReadmeUrl: ../../../README-SAR.md
    HomePageUrl: https://github.com/elenavanengelenmaslova/mocknest-serverless
    SourceCodeUrl: https://github.com/elenavanengelenmaslova/mocknest-serverless
    Labels:
      - mock
      - testing
      - wiremock
      - ai

Parameters:
  DeploymentName:
    Type: String
    Default: 'mocks'
    Description: Deployment instance identifier for this MockNest installation (e.g., team-alpha, payment-apis, test, mocks)
    AllowedPattern: '^[a-zA-Z0-9\\-_]+$'
    ConstraintDescription: Stage name must contain only alphanumeric characters, hyphens, and underscores

  AuthMode:
    Type: String
    Default: 'API_KEY'
    AllowedValues:
      - API_KEY
      - IAM
    Description: |
      Authentication mode for all API Gateway endpoints.
      API_KEY (default): callers supply an x-api-key header. An API key and usage plan are created automatically.
      IAM: callers sign requests with AWS Signature Version 4. No API key is created.

  LambdaMemorySize:
    Type: Number
    Default: "512"
    MinValue: "512"
    MaxValue: "10240"
    Description: |
      Lambda function memory size in MB.
      Default (512 MB) determined by Lambda Power Tuner analysis for optimal cost/performance balance.
      See docs/PERFORMANCE.md for tuning methodology and results.

  LambdaTimeout:
    Type: Number
    Default: "30"
    MinValue: "3"
    MaxValue: "900"
    Description: Lambda function timeout in seconds. Default aligns with API Gateway synchronous timeout (~29s).

  BedrockModelName:
    Type: String
    Default: 'AmazonNovaPro'
    Description: |
      Bedrock model name for AI-powered mock generation.
      Amazon Nova Pro is officially supported and tested.
      Other models are experimental and may not work in all regions.
      See https://docs.aws.amazon.com/bedrock/latest/userguide/models-supported.html for details.
    AllowedValues:
      # Claude 4.5 models
      - AnthropicClaude45Opus
      - AnthropicClaude4_5Sonnet
      - AnthropicClaude4_5Haiku
      # Claude 4 models
      - AnthropicClaude4Opus
      - AnthropicClaude41Opus
      - AnthropicClaude4Sonnet
      # Claude 3.5 models
      - AnthropicClaude35SonnetV2
      - AnthropicClaude35Haiku
      # Claude 3 models
      - AnthropicClaude3Opus
      - AnthropicClaude3Sonnet
      - AnthropicClaude3Haiku
      - AnthropicClaude21
      - AnthropicClaudeInstant
      # Amazon Nova models
      - AmazonNovaMicro
      - AmazonNovaLite
      - AmazonNovaPro
      - AmazonNovaPremier
      # AI21 Jamba models
      - AI21JambaLarge
      - AI21JambaMini
      # Meta Llama models
      - MetaLlama3_0_8BInstruct
      - MetaLlama3_0_70BInstruct
      - MetaLlama3_1_8BInstruct
      - MetaLlama3_1_70BInstruct
      - MetaLlama3_1_405BInstruct
      - MetaLlama3_2_1BInstruct
      - MetaLlama3_2_3BInstruct
      - MetaLlama3_2_11BInstruct
      - MetaLlama3_2_90BInstruct
      - MetaLlama3_3_70BInstruct
    ConstraintDescription: Must be a valid BedrockModels constant name

  BedrockInferenceMode:
    Type: String
    Default: 'AUTO'
    Description: |
      Inference profile selection mode for Bedrock model access:
      - AUTO: Try region-specific inference profile first, then global (recommended for most use cases, especially Nova models)
      - GLOBAL_ONLY: Force global inference profile only (use when model is only available globally)
      - GEO_ONLY: Force region-specific inference profile only (use for data residency requirements)
    AllowedValues:
      - AUTO
      - GLOBAL_ONLY
      - GEO_ONLY
    ConstraintDescription: Must be AUTO, GLOBAL_ONLY, or GEO_ONLY

  BedrockGenerationMaxRetries:
    Type: Number
    Default: "1"
    MinValue: "0"
    MaxValue: "2"
    Description: Maximum number of retry attempts for AI mock generation if validation fails. Limited to 0-2 due to API Gateway synchronous timeout (~29s).

  LogRetentionDays:
    Type: Number
    Default: "7"
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1096
      - 1827
      - 2192
      - 2557
      - 2922
      - 3288
      - 3653
    Description: Number of days to retain CloudWatch logs for Lambda functions.

Conditions:
  IsIamMode: !Equals [!Ref AuthMode, 'IAM']
  IsApiKeyMode: !Not [Condition: IsIamMode]

Globals:
  Function:
    Runtime: java25
    Architectures:
      - arm64
    MemorySize: !Ref LambdaMemorySize
    Timeout: !Ref LambdaTimeout
    Environment:
      Variables:
        SPRING_PROFILES_ACTIVE: aws

Resources:
  # S3 bucket for mock definitions and response payloads
  MockStorage:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # IAM Role for Lambda function
  MockNestLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: MockNestS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt MockStorage.Arn
                  - !Sub "${MockStorage.Arn}/*"

              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt MockNestDLQ.Arn

        - PolicyName: MockNestBedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                # Resource pattern allows all regions for Bedrock to support cross-region inference profiles.
                # Inference profiles (e.g., eu.amazon-nova-pro-v1:0) can route to models in different regions.
                # Pattern covers both foundation models and inference profiles:
                # - arn:aws:bedrock:region::foundation-model/model-id
                # - arn:aws:bedrock:region::inference-profile/prefix.model-id
                Resource: "arn:aws:bedrock:*:*:*"
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # Dead Letter Queue for failed Lambda invocations
  MockNestDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-dlq"
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # API Gateway REST API — API key mode (default)
  MockNestApiKeyModeApi:
    Type: AWS::Serverless::Api
    Condition: IsApiKeyMode
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      StageName: !Ref DeploymentName
      OpenApiVersion: '3.0.1'
      Auth:
        ApiKeyRequired: true
      Tags:
        Application: MockNest-Serverless

  # API Gateway REST API — IAM mode
  MockNestIamModeApi:
    Type: AWS::Serverless::Api
    Condition: IsIamMode
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      StageName: !Ref DeploymentName
      OpenApiVersion: '3.0.1'
      Auth:
        DefaultAuthorizer: AWS_IAM
      Tags:
        Application: MockNest-Serverless

  # API Key for authentication
  MockNestApiKey:
    Type: AWS::ApiGateway::ApiKey
    Condition: IsApiKeyMode
    DependsOn: MockNestApiKeyModeApiStage
    Properties:
      Name: !Sub "${AWS::StackName}-api-key"
      Description: API key for MockNest Serverless access
      Enabled: true
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # Usage Plan for API throttling and quotas
  MockNestUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Condition: IsApiKeyMode
    DependsOn: MockNestApiKeyModeApiStage
    Properties:
      UsagePlanName: !Sub "${AWS::StackName}-usage-plan"
      Description: Usage plan for MockNest Serverless API
      ApiStages:
        - ApiId: !Ref MockNestApiKeyModeApi
          Stage: !Ref DeploymentName
      Throttle:
        BurstLimit: 1    # Limit concurrent requests to reduce Lambda scaling
        RateLimit: 100   # Allow 100 requests/second sequential - mocks are very fast
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # Associate API Key with Usage Plan
  MockNestUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Condition: IsApiKeyMode
    Properties:
      KeyId: !Ref MockNestApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref MockNestUsagePlan

  # Lambda function for MockNest Serverless runtime — API key mode
  MockNestRuntimeFunction:
    Type: AWS::Serverless::Function
    Condition: IsApiKeyMode
    Properties:
      FunctionName: !Sub "${AWS::StackName}-runtime"
      CodeUri: ../../../build/dist/mocknest-serverless.jar
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Role: !GetAtt MockNestLambdaRole.Arn
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          MOCK_STORAGE_BUCKET: !Ref MockStorage
          MOCKNEST_S3_BUCKET_NAME: !Ref MockStorage
          SPRING_CLOUD_FUNCTION_DEFINITION: "runtimeRouter"
          MAIN_CLASS: "nl.vintik.mocknest.infra.aws.MockNestApplication"
          JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
          MOCKNEST_SENSITIVE_HEADERS: "x-api-key,authorization"
          MOCKNEST_WEBHOOK_TIMEOUT_MS: "10000"
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt MockNestDLQ.Arn
      Tags:
        Application: MockNest-Serverless
        Component: Runtime
      Events:
        AdminRoutes:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestApiKeyModeApi
            Path: /__admin/{proxy+}
            Method: ANY
        MockRoutes:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestApiKeyModeApi
            Path: /mocknest/{proxy+}
            Method: ANY

  # Lambda function for MockNest Serverless runtime — IAM mode
  MockNestRuntimeFunctionIam:
    Type: AWS::Serverless::Function
    Condition: IsIamMode
    Properties:
      FunctionName: !Sub "${AWS::StackName}-runtime"
      CodeUri: ../../../build/dist/mocknest-serverless.jar
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Role: !GetAtt MockNestLambdaRole.Arn
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          MOCK_STORAGE_BUCKET: !Ref MockStorage
          MOCKNEST_S3_BUCKET_NAME: !Ref MockStorage
          SPRING_CLOUD_FUNCTION_DEFINITION: "runtimeRouter"
          MAIN_CLASS: "nl.vintik.mocknest.infra.aws.MockNestApplication"
          JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
          MOCKNEST_SENSITIVE_HEADERS: "x-api-key,authorization"
          MOCKNEST_WEBHOOK_TIMEOUT_MS: "10000"
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt MockNestDLQ.Arn
      Tags:
        Application: MockNest-Serverless
        Component: Runtime
      Events:
        AdminRoutes:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestIamModeApi
            Path: /__admin/{proxy+}
            Method: ANY
        MockRoutes:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestIamModeApi
            Path: /mocknest/{proxy+}
            Method: ANY

  # Lambda function for MockNest Generation — API key mode
  MockNestGenerationFunction:
    Type: AWS::Serverless::Function
    Condition: IsApiKeyMode
    Properties:
      FunctionName: !Sub "${AWS::StackName}-generation"
      CodeUri: ../../../build/dist/mocknest-serverless.jar
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Role: !GetAtt MockNestLambdaRole.Arn
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          MOCK_STORAGE_BUCKET: !Ref MockStorage
          MOCKNEST_S3_BUCKET_NAME: !Ref MockStorage
          SPRING_CLOUD_FUNCTION_DEFINITION: "generationRouter"
          MAIN_CLASS: "nl.vintik.mocknest.infra.aws.MockNestApplication"
          JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
          BEDROCK_MODEL_NAME: !Ref BedrockModelName
          BEDROCK_INFERENCE_MODE: !Ref BedrockInferenceMode
          MOCKNEST_BEDROCK_GENERATION_MAX_RETRIES: !Ref BedrockGenerationMaxRetries
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt MockNestDLQ.Arn
      Tags:
        Application: MockNest-Serverless
        Component: Generation
      Events:
        AIRoutes:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestApiKeyModeApi
            Path: /ai/{proxy+}
            Method: ANY

  # Lambda function for MockNest Generation — IAM mode
  MockNestGenerationFunctionIam:
    Type: AWS::Serverless::Function
    Condition: IsIamMode
    Properties:
      FunctionName: !Sub "${AWS::StackName}-generation"
      CodeUri: ../../../build/dist/mocknest-serverless.jar
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Role: !GetAtt MockNestLambdaRole.Arn
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          MOCK_STORAGE_BUCKET: !Ref MockStorage
          MOCKNEST_S3_BUCKET_NAME: !Ref MockStorage
          SPRING_CLOUD_FUNCTION_DEFINITION: "generationRouter"
          MAIN_CLASS: "nl.vintik.mocknest.infra.aws.MockNestApplication"
          JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
          BEDROCK_MODEL_NAME: !Ref BedrockModelName
          BEDROCK_INFERENCE_MODE: !Ref BedrockInferenceMode
          MOCKNEST_BEDROCK_GENERATION_MAX_RETRIES: !Ref BedrockGenerationMaxRetries
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt MockNestDLQ.Arn
      Tags:
        Application: MockNest-Serverless
        Component: Generation
      Events:
        AIRoutes:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestIamModeApi
            Path: /ai/{proxy+}
            Method: ANY

  # CloudWatch Log Group for Runtime Lambda
  RuntimeLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-runtime"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # CloudWatch Log Group for Generation Lambda
  GenerationLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-generation"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Application
          Value: MockNest-Serverless
Outputs:
  MockNestApiUrl:
    Description: "API Gateway endpoint URL for MockNest Serverless"
    Value: !Sub
      - "https://${ApiId}.execute-api.${AWS::Region}.amazonaws.com/${DeploymentName}/"
      - ApiId: !If [IsIamMode, !Ref MockNestIamModeApi, !Ref MockNestApiKeyModeApi]
    Export:
      Name: !Sub "${AWS::StackName}-api-url"

  MockNestApiId:
    Description: "API Gateway API ID for MockNest Serverless"
    Value: !If [IsIamMode, !Ref MockNestIamModeApi, !Ref MockNestApiKeyModeApi]
    Export:
      Name: !Sub "${AWS::StackName}-api-id"

  MockStorageBucket:
    Description: "S3 bucket for mock storage"
    Value: !Ref MockStorage
    Export:
      Name: !Sub "${AWS::StackName}-storage-bucket"

  MockNestRuntimeFunctionName:
    Description: "Lambda function name for MockNest runtime"
    Value: !If [IsIamMode, !Ref MockNestRuntimeFunctionIam, !Ref MockNestRuntimeFunction]
    Export:
      Name: !Sub "${AWS::StackName}-runtime-function-name"

  MockNestGenerationFunctionName:
    Description: "Lambda function name for MockNest generation"
    Value: !If [IsIamMode, !Ref MockNestGenerationFunctionIam, !Ref MockNestGenerationFunction]
    Export:
      Name: !Sub "${AWS::StackName}-generation-function-name"

  Region:
    Description: "AWS region where MockNest is deployed"
    Value: !Ref "AWS::Region"
    Export:
      Name: !Sub "${AWS::StackName}-region"

  DeploymentName:
    Description: "Deployment instance identifier"
    Value: !Ref DeploymentName
    Export:
      Name: !Sub "${AWS::StackName}-deployment-name"

  StackName:
    Description: "CloudFormation stack name"
    Value: !Ref "AWS::StackName"
    Export:
      Name: !Sub "${AWS::StackName}-stack-name"

  MockNestApiKey:
    Condition: IsApiKeyMode
    Description: "API key ID (only present when AuthMode=API_KEY)"
    Value: !GetAtt MockNestApiKey.APIKeyId
    Export:
      Name: !Sub "${AWS::StackName}-api-key"

  AuthMode:
    Description: "Authentication mode for API Gateway endpoints (API_KEY or IAM)"
    Value: !Ref AuthMode
    Export:
      Name: !Sub "${AWS::StackName}-auth-mode"

  RuntimeFunctionVersion:
    Description: "Published version of Runtime function with SnapStart"
    Value: !If [IsIamMode, !Ref MockNestRuntimeFunctionIam.Version, !Ref MockNestRuntimeFunction.Version]
    Export:
      Name: !Sub "${AWS::StackName}-runtime-version"

  RuntimeFunctionAlias:
    Description: "Alias pointing to latest published Runtime function version"
    Value: !If [IsIamMode, !Ref MockNestRuntimeFunctionIamAliaslive, !Ref MockNestRuntimeFunctionAliaslive]
    Export:
      Name: !Sub "${AWS::StackName}-runtime-alias"

  GenerationFunctionVersion:
    Description: "Published version of Generation function with SnapStart"
    Value: !If [IsIamMode, !Ref MockNestGenerationFunctionIam.Version, !Ref MockNestGenerationFunction.Version]
    Export:
      Name: !Sub "${AWS::StackName}-generation-version"

  GenerationFunctionAlias:
    Description: "Alias pointing to latest published Generation function version"
    Value: !If [IsIamMode, !Ref MockNestGenerationFunctionIamAliaslive, !Ref MockNestGenerationFunctionAliaslive]
    Export:
      Name: !Sub "${AWS::StackName}-generation-alias"

  SnapStartEnabled:
    Description: "Indicates whether SnapStart is enabled for Lambda functions"
    Value: "true"
    Export:
      Name: !Sub "${AWS::StackName}-snapstart-enabled"
