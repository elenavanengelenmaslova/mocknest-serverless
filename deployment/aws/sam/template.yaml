AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MockNest Serverless - AWS-native serverless mock runtime

Parameters:
  EnableAI:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable AI-assisted mock generation features

  StageName:
    Type: String
    Default: 'v1'
    Description: API Gateway stage name (e.g., v1, test, team-alpha)
    AllowedPattern: '^[a-zA-Z0-9\-_]+$'
    ConstraintDescription: Stage name must contain only alphanumeric characters, hyphens, and underscores

  BucketName:
    Type: String
    Default: ''
    Description: Custom S3 bucket name for mock storage (optional, auto-generated if empty)

  LambdaMemorySize:
    Type: Number
    Default: 1024
    MinValue: 512
    MaxValue: 10240
    Description: Lambda function memory size in MB

  LambdaTimeout:
    Type: Number
    Default: 120
    MinValue: 3
    MaxValue: 900
    Description: Lambda function timeout in seconds

Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref BucketName, '']]
  IsAIEnabled: !Equals [!Ref EnableAI, 'true']

Globals:
  Function:
    Runtime: java21
    MemorySize: !Ref LambdaMemorySize
    Timeout: !Ref LambdaTimeout
    Environment:
      Variables:
        SPRING_PROFILES_ACTIVE: aws

Resources:
  # S3 bucket for mock definitions and response payloads
  MockStorage:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasCustomBucketName
        - !Ref BucketName
        - !Ref AWS::NoValue
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # IAM Role for Lambda function
  MockNestLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MockNestCloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
        - PolicyName: MockNestS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt MockStorage.Arn
                  - !Sub "${MockStorage.Arn}/*"

              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt MockNestDLQ.Arn

        - !If
          - IsAIEnabled
          - PolicyName: MockNestBedrockAccess
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - bedrock:InvokeModel
                    - bedrock:InvokeModelWithResponseStream
                    - bedrock:ListFoundationModels
                  Resource: "*"
                  Condition:
                    StringEquals:
                      "aws:RequestedRegion": !Ref "AWS::Region"
          - !Ref "AWS::NoValue"
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # Dead Letter Queue for failed Lambda invocations
  MockNestDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-dlq"
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # API Gateway REST API
  MockNestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      StageName: !Ref StageName
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingBurstLimit: 200
          ThrottlingRateLimit: 100
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: '{"requestId":"$context.requestId","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","path":"$context.path","resourcePath":"$context.resourcePath","status":$context.status,"responseLength":$context.responseLength,"responseTime":$context.responseTime,"userAgent":"$context.identity.userAgent","sourceIp":"$context.identity.sourceIp"}'

      Auth:
        ApiKeyRequired: false  # Disable API key requirement for initial testing
        UsagePlan:
          CreateUsagePlan: PER_API
          Description: !Sub "Usage plan for MockNest Serverless"
          UsagePlanName: !Sub "${AWS::StackName}-usage-plan"
          Quota:
            Limit: 50000
            Period: MONTH
          Throttle:
            BurstLimit: 200
            RateLimit: 100
      Tags:
        Application: MockNest-Serverless

  # Lambda function for MockNest Serverless runtime
  MockNestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-runtime"
      CodeUri: ../../../software/infra/aws/build/libs/aws-1.0.0-SNAPSHOT.jar
      Handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker::handleRequest
      Role: !GetAtt MockNestLambdaRole.Arn
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          MOCK_STORAGE_BUCKET: !Ref MockStorage
          AI_ENABLED: !Ref EnableAI
          MOCKNEST_S3_BUCKET_NAME: !Ref MockStorage
          SPRING_CLOUD_FUNCTION_DEFINITION: "router"
          MAIN_CLASS: "io.mocknest.infra.aws.ApplicationKt"
          # JVM optimization for faster cold starts
          JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt MockNestDLQ.Arn
      Tags:
        Application: MockNest-Serverless
      Events:
        ProxyResource:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestApi
            Path: /{proxy+}
            Method: ANY
        RootResource:
          Type: Api
          Properties:
            RestApiId: !Ref MockNestApi
            Path: /
            Method: ANY

  # Lambda permission for API Gateway to invoke the function
  MockNestLambdaPermission:
    Type: AWS::Lambda::Permission
    DependsOn: MockNestFunction
    Properties:
      FunctionName: !Ref MockNestFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MockNestApi}/*"

  # CloudWatch Log Group for API Gateway
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}"
      RetentionInDays: 30
      Tags:
        - Key: Application
          Value: MockNest-Serverless

  # CloudWatch Log Group for Lambda
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-runtime"
      RetentionInDays: 30
      Tags:
        - Key: Application
          Value: MockNest-Serverless

Outputs:
  MockNestApiUrl:
    Description: "API Gateway endpoint URL for MockNest Serverless"
    Value: !Sub "https://${MockNestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/"
    Export:
      Name: !Sub "${AWS::StackName}-api-url"

  MockNestApiId:
    Description: "API Gateway API ID for MockNest Serverless"
    Value: !Ref MockNestApi
    Export:
      Name: !Sub "${AWS::StackName}-api-id"

  MockStorageBucket:
    Description: "S3 bucket for mock storage"
    Value: !Ref MockStorage
    Export:
      Name: !Sub "${AWS::StackName}-storage-bucket"

  MockNestFunctionName:
    Description: "Lambda function name for MockNest runtime"
    Value: !Ref MockNestFunction
    Export:
      Name: !Sub "${AWS::StackName}-function-name"

  Region:
    Description: "AWS region where MockNest is deployed"
    Value: !Ref "AWS::Region"
    Export:
      Name: !Sub "${AWS::StackName}-region"

  StageName:
    Description: "API Gateway stage name"
    Value: !Ref StageName
    Export:
      Name: !Sub "${AWS::StackName}-stage-name"

  StackName:
    Description: "CloudFormation stack name"
    Value: !Ref "AWS::StackName"
    Export:
      Name: !Sub "${AWS::StackName}-stack-name"
