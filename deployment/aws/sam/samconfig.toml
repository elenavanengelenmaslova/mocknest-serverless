version = 0.1

# Default configuration for development deployments
[default.global.parameters]
stack_name = "mocknest-serverless-dev"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = false
s3_bucket = "lambda-deployment-clean-architecture-example"
s3_prefix = "mocknest-serverless-dev"
region = "eu-west-1"
image_repositories = []
parameter_overrides = [
  "EnableAI=false",
  "Environment=dev"
]

# Staging configuration
[staging.global.parameters]
stack_name = "mocknest-serverless-staging"

[staging.build.parameters]
cached = true
parallel = true

[staging.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = false
s3_bucket = "lambda-deployment-clean-architecture-example"
s3_prefix = "mocknest-serverless-staging"
region = "eu-west-1"
image_repositories = []
parameter_overrides = [
  "EnableAI=false",
  "Environment=staging"
]
