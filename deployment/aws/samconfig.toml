version = 0.1

# Default configuration for development deployments
[default.global.parameters]
stack_name = "mocknest-serverless"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
s3_prefix = "mocknest-serverless"
# Default region: eu-west-1 (change this to deploy in a different region)
region = "eu-west-1"
image_repositories = []
parameter_overrides = [
    "EnableAI=false"
    # "BucketName=my-custom-bucket-name"  # Uncomment to use custom bucket name
]

# Production configuration with AI features enabled
[production.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
s3_prefix = "mocknest-serverless-prod"
# Production region: eu-west-1 (change this to deploy in a different region)
region = "eu-west-1"
parameter_overrides = [
    "EnableAI=true"
    # "BucketName=my-production-bucket-name"  # Uncomment to use custom bucket name
]