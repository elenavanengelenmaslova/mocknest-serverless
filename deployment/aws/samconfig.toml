version = 0.1

[default.global.parameters]
stack_name = "mocknest-serverless"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
s3_prefix = "mocknest-serverless"
region = "eu-west-1"
image_repositories = []
parameter_overrides = [
    "EnableAI=false"
]

[production.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
s3_prefix = "mocknest-serverless-prod"
region = "eu-west-1"
parameter_overrides = [
    "EnableAI=true"
]