AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC Role for MockNest Serverless deployment (hardened two-role pattern)

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or username
    Default: your-github-org

  GitHubRepo:
    Type: String
    Description: GitHub repository name
    Default: mocknest-serverless

  RoleName:
    Type: String
    Description: Name for the GitHub Actions role
    Default: GitHubActionsRole

  ExistingOIDCProviderArn:
    Type: String
    Description: ARN of an existing GitHub OIDC provider (leave empty to create a new one)
    Default: ''

Conditions:
  CreateOIDCProvider: !Equals [!Ref ExistingOIDCProviderArn, '']

Resources:
  # S3 bucket for SAM deployment artifacts (Lambda code, packaged template, SAR LICENSE/README).
  # Owned by this bootstrap stack so the GitHub Actions role only needs object-level access
  # (no CreateBucket/DeleteBucket/TagResource), and SAM does not need resolve_s3 managed buckets.
  # Name is derived from account id + region for global uniqueness without hard-coding.
  MockNestArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'mocknest-sam-artifacts-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: MockNest-Serverless
        - Key: Purpose
          Value: SAM-Deployment-Artifacts

  # OIDC Identity Provider for GitHub Actions (only created if no existing provider ARN is given)
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd
      Tags:
        - Key: Application
          Value: MockNest-Serverless
        - Key: Purpose
          Value: GitHub-Actions-OIDC

  # IAM Role for GitHub Actions - minimal SAM deployment permissions only
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Ref ExistingOIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': sts.amazonaws.com
                'token.actions.githubusercontent.com:sub':
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main'
      Policies:
        - PolicyName: GitHubActionsDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudFormation permissions for SAM deployment
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:ListStacks
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:GetTemplateSummary
                Resource: '*'

              # S3 permissions scoped to SAM artifact buckets
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::aws-sam-cli-managed-default-*'
                  - 'arn:aws:s3:::aws-sam-cli-managed-default-*/*'
                  - 'arn:aws:s3:::mocknest-sar-artifacts-*'
                  - 'arn:aws:s3:::mocknest-sar-artifacts-*/*'
                  - !GetAtt MockNestArtifactsBucket.Arn
                  - !Sub '${MockNestArtifactsBucket.Arn}/*'

              # S3 bucket creation for SAR artifact bucket
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutBucketPolicy
                Resource:
                  - 'arn:aws:s3:::aws-sam-cli-managed-default-*'
                  - 'arn:aws:s3:::mocknest-sar-artifacts-*'

              # iam:PassRole scoped to CloudFormation execution role only
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt MockNestCloudFormationExecutionRole.Arn
                Condition:
                  StringEquals:
                    'iam:PassedToService': cloudformation.amazonaws.com

              # Read the generated API key value during post-deploy integration tests
              # (the integration-test job calls `aws apigateway get-api-key --include-value`).
              - Effect: Allow
                Action:
                  - apigateway:GET
                Resource:
                  - !Sub 'arn:aws:apigateway:${AWS::Region}::/apikeys/*'

              # IAM auth mode: integration tests sign requests to the deployed API with SigV4
              # (--aws-sigv4 ...:execute-api). Not used in API_KEY mode (api-key header instead).
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource:
                  - !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*'

              # IAM auth mode: the API uses a caller-credentials (response-streaming) Lambda
              # integration, so API Gateway invokes the runtime/generation functions AS the
              # calling identity. The caller therefore needs lambda:InvokeFunction on those
              # functions (and their aliases). Not required in API_KEY mode, which uses the
              # function's resource-based policy for the apigateway principal instead.
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:mocknest-serverless*'

              # IAM auth mode: the webhook integration test polls the S3 request journal
              # under the requests/ prefix only (list-objects-v2 + get-object).
              # ListBucket is scoped to the requests/ prefix; GetObject to requests/* objects.
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::mocknest-serverless*mockstorage*'
                Condition:
                  StringLike:
                    's3:prefix':
                      - 'requests/'
                      - 'requests/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - 'arn:aws:s3:::mocknest-serverless*mockstorage*/requests/*'

              # Serverless Application Repository publishing
              - Effect: Allow
                Action:
                  - serverlessrepo:*
                Resource: '*'
      Tags:
        - Key: Application
          Value: MockNest-Serverless
        - Key: Purpose
          Value: GitHub-Actions-Deployment

  # CloudFormation Execution Role - assumed by CloudFormation to create/modify stack resources
  MockNestCloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MockNestCloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Lambda permissions (explicit action list — no service-level wildcard,
              # per the OIDC least-privilege policy enforced by scripts/check-oidc-policy.sh).
              # Covers the full SAM lifecycle including SnapStart version/alias creation,
              # which reads runtime-management and code-signing config on the version.
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:GetPolicy
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetFunctionCodeSigningConfig
                  - lambda:GetRuntimeManagementConfig
                  - lambda:PutRuntimeManagementConfig
                  - lambda:ListVersionsByFunction
                  - lambda:PublishVersion
                  - lambda:CreateAlias
                  - lambda:UpdateAlias
                  - lambda:DeleteAlias
                  - lambda:GetAlias
                  - lambda:InvokeFunction
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:ListTags
                  - lambda:PutFunctionEventInvokeConfig
                  - lambda:GetFunctionEventInvokeConfig
                  - lambda:UpdateFunctionEventInvokeConfig
                  - lambda:DeleteFunctionEventInvokeConfig
                Resource:
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*'

              # Lambda event source mappings (SQS -> RuntimeAsync webhook consumer).
              # CreateEventSourceMapping does not support resource-level scoping.
              - Effect: Allow
                Action:
                  - lambda:CreateEventSourceMapping
                  - lambda:GetEventSourceMapping
                  - lambda:UpdateEventSourceMapping
                  - lambda:DeleteEventSourceMapping
                  - lambda:ListEventSourceMappings
                Resource: '*'

              # API Gateway permissions scoped to account
              - Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:DELETE
                  - apigateway:PATCH
                Resource:
                  - !Sub 'arn:aws:apigateway:${AWS::Region}::/*'

              # S3 bucket management permissions
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketNotification
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutLifecycleConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:TagResource
                  - s3:UntagResource
                Resource: '*'

              # SQS permissions
              - Effect: Allow
                Action:
                  - sqs:CreateQueue
                  - sqs:DeleteQueue
                  - sqs:GetQueueAttributes
                  - sqs:SetQueueAttributes
                  - sqs:TagQueue
                  - sqs:UntagQueue
                  - sqs:GetQueueUrl
                Resource:
                  - !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:*'

              # CloudWatch Logs permissions
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DescribeLogGroups
                  - logs:TagLogGroup
                  - logs:TagResource
                  - logs:UntagResource
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

              # IAM role and policy management for stack resources
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicyVersions
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                Resource: '*'

              # Bedrock permissions for Lambda runtime role creation
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:*'

              # Required to expand the SAM (Serverless) transform during stack operations.
              # CloudFormation, acting as this execution role, calls CreateChangeSet
              # against the managed transform macro to process `Transform: AWS::Serverless-2016-10-31`.
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                Resource:
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:aws:transform/Serverless-2016-10-31'
      Tags:
        - Key: Application
          Value: MockNest-Serverless
        - Key: Purpose
          Value: CloudFormation-Execution

Outputs:
  GitHubActionsRoleArn:
    Description: ARN of the GitHub Actions role
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: GitHubActionsRoleArn

  MockNestArtifactsBucketName:
    Description: Name of the S3 bucket used for SAM deployment artifacts
    Value: !Ref MockNestArtifactsBucket
    Export:
      Name: MockNestArtifactsBucketName

  MockNestCloudFormationExecutionRoleArn:
    Description: ARN of the CloudFormation execution role
    Value: !GetAtt MockNestCloudFormationExecutionRole.Arn
    Export:
      Name: MockNestCloudFormationExecutionRoleArn

  OIDCProviderArn:
    Description: ARN of the OIDC provider
    Value: !If
      - CreateOIDCProvider
      - !Ref GitHubOIDCProvider
      - !Ref ExistingOIDCProviderArn
    Export:
      Name: GitHubOIDCProviderArn

  SetupInstructions:
    Description: Instructions for completing the setup
    Value: !Sub |
      1. Add this secret to your GitHub repository:
         AWS_ACCOUNT_ID: ${AWS::AccountId}

      2. Update the GitHubOrg and GitHubRepo parameters in this template to match your repository

      3. Your GitHub Actions workflows can now use OIDC authentication with:
         role-to-assume: ${GitHubActionsRole.Arn}

      4. Use the CloudFormation execution role for SAM deployments:
         --role-arn ${MockNestCloudFormationExecutionRole.Arn}
