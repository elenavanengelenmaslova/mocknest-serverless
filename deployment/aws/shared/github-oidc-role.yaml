AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC Role for MockNest Serverless deployment

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or username
    Default: your-github-org
  
  GitHubRepo:
    Type: String
    Description: GitHub repository name
    Default: mocknest-serverless
  
  RoleName:
    Type: String
    Description: Name for the GitHub Actions role
    Default: GitHubActionsRole

Resources:
  # OIDC Identity Provider for GitHub Actions
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCIdentityProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd
      Tags:
        - Key: Application
          Value: MockNest-Serverless
        - Key: Purpose
          Value: GitHub-Actions-OIDC

  # IAM Role for GitHub Actions
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': sts.amazonaws.com
              StringLike:
                'token.actions.githubusercontent.com:sub': 
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main'
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/feature/*'
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/bugfix/*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: GitHubActionsDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudFormation permissions
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource: '*'
              
              # IAM permissions for CloudFormation
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:UpdateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicyVersions
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:SetDefaultPolicyVersion
                Resource: '*'
              
              # S3 permissions for SAM artifacts and mock storage
              - Effect: Allow
                Action:
                  - s3:*
                Resource: '*'
              
              # Lambda permissions
              - Effect: Allow
                Action:
                  - lambda:*
                Resource: '*'
              
              # API Gateway permissions
              - Effect: Allow
                Action:
                  - apigateway:*
                Resource: '*'
              
              # API Gateway execute-api permissions (required for IAM auth mode validation)
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource: !Sub 'arn:aws:execute-api:*:${AWS::AccountId}:*'
              
              # SQS permissions for DLQ
              - Effect: Allow
                Action:
                  - sqs:*
                Resource: '*'
              
              # CloudWatch Logs permissions
              - Effect: Allow
                Action:
                  - logs:*
                Resource: '*'
              
              # Bedrock permissions (for AI features)
              - Effect: Allow
                Action:
                  - bedrock:*
                Resource: '*'
      Tags:
        - Key: Application
          Value: MockNest-Serverless
        - Key: Purpose
          Value: GitHub-Actions-Deployment

Outputs:
  GitHubActionsRoleArn:
    Description: ARN of the GitHub Actions role
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: GitHubActionsRoleArn
  
  OIDCProviderArn:
    Description: ARN of the OIDC provider
    Value: !Ref GitHubOIDCProvider
    Export:
      Name: GitHubOIDCProviderArn
  
  SetupInstructions:
    Description: Instructions for completing the setup
    Value: !Sub |
      1. Add this secret to your GitHub repository:
         AWS_ACCOUNT_ID: ${AWS::AccountId}
      
      2. Update the GitHubOrg and GitHubRepo parameters in this template to match your repository
      
      3. Your GitHub Actions workflows can now use OIDC authentication with:
         role-to-assume: ${GitHubActionsRole.Arn}