name: SAR Release (Public)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'SAR version (semantic version)'
        required: true
        default: '1.0.0'
        type: string
      aws-region:
        description: 'AWS region for SAR publishing'
        required: false
        default: 'us-east-1'
        type: string
      github-actions-role-name:
        description: 'GitHub Actions OIDC role name'
        required: false
        default: 'GitHubOIDCAdmin'
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/workflow-sar-publish.yml
    with:
      version: ${{ inputs.version || github.event.release.tag_name || '1.0.0' }}
      aws-region: ${{ inputs.aws-region || 'us-east-1' }}
      github-actions-role-name: ${{ inputs.github-actions-role-name || 'GitHubOIDCAdmin' }}
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          
  create-summary:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Create SAR deployment summary
        run: |
          echo "## 📦 MockNest Serverless Published to SAR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version || github.event.release.tag_name || '1.0.0' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ inputs.aws-region || 'us-east-1' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Application ID:** ${{ needs.publish.outputs.application-id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to [AWS Serverless Application Repository](https://console.aws.amazon.com/serverlessrepo/home)" >> $GITHUB_STEP_SUMMARY
          echo "2. Find 'MockNest-Serverless' in your applications" >> $GITHUB_STEP_SUMMARY
          echo "3. Make it public to allow others to deploy it" >> $GITHUB_STEP_SUMMARY
          echo "4. Update the ApplicationId in deployment scripts" >> $GITHUB_STEP_SUMMARY
