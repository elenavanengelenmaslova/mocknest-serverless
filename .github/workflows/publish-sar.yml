name: Publish to SAR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'SAR version (semantic version)'
        required: true
        default: '1.0.0'
        type: string
      aws-region:
        description: 'AWS region for SAR publishing'
        required: false
        default: 'us-east-1'
        type: string
      github-actions-role-name:
        description: 'GitHub Actions OIDC role name'
        required: false
        default: 'GitHubOIDCAdmin'
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish-sar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
          
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name || 'GitHubActionsRole' }}
          role-session-name: MockNestSARPublishing
          aws-region: ${{ inputs.aws-region || 'us-east-1' }}
          
      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        
      - name: Build application
        run: ./gradlew clean build
        
      - name: Publish to SAR
        run: |
          echo "🚀 Publishing to SAR..."
          cd deployment/aws/sam
          
          # Create S3 bucket for SAR artifacts if it doesn't exist
          SAR_BUCKET="mocknest-sar-publish-${{ secrets.AWS_ACCOUNT_ID }}"
          aws s3 mb s3://$SAR_BUCKET --region ${{ inputs.aws-region || 'us-east-1' }} || echo "Bucket already exists"
          
          # Build and package
          sam build
          sam package \
            --s3-bucket $SAR_BUCKET \
            --output-template-file packaged-template.yaml \
            --region ${{ inputs.aws-region || 'us-east-1' }}
          
          # Publish to SAR
          sam publish \
            --template packaged-template.yaml \
            --region ${{ inputs.aws-region || 'us-east-1' }} \
            --semantic-version ${{ inputs.version || github.event.release.tag_name || '1.0.0' }}
        env:
          SAR_VERSION: ${{ inputs.version || github.event.release.tag_name || '1.0.0' }}
          AWS_REGION: ${{ inputs.aws-region || 'us-east-1' }}
          
      - name: Create SAR deployment summary
        run: |
          echo "## 📦 MockNest Serverless Published to SAR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version || github.event.release.tag_name || '1.0.0' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ inputs.aws-region || 'us-east-1' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to [AWS Serverless Application Repository](https://console.aws.amazon.com/serverlessrepo/home)" >> $GITHUB_STEP_SUMMARY
          echo "2. Find 'mocknest-serverless' in your applications" >> $GITHUB_STEP_SUMMARY
          echo "3. Make it public to allow others to deploy it" >> $GITHUB_STEP_SUMMARY
          echo "4. Update the ApplicationId in deployment scripts" >> $GITHUB_STEP_SUMMARY