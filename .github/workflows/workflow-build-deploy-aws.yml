name: Reusable AWS Build and Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Deployment environment (default or production)'
      enable-ai:
        required: false
        type: boolean
        default: false
        description: 'Enable AI features'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_ACCOUNT_ID:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '9.0'
          
      - name: Run tests with coverage
        run: ./gradlew test koverHtmlReport koverXmlReport koverVerify
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: build/reports/kover/report.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
        
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ inputs.environment }}
          path: build/reports/kover/html/

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '9.0'
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1
          
      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        
      - name: Build and deploy
        run: |
          cd deployment/aws
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh ${{ inputs.environment }}
        env:
          ENABLE_AI: ${{ inputs.enable-ai }}