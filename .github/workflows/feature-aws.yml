name: CICD - Feature Branch AWS

on:
  push:
    branches:
      - 'feature/*'
      - 'bugfix/*'
      - 'dependabot/**'
    paths-ignore:
      - '**.md'
      - '.kiro/**'
      - 'docs/**'
      - '.github/workflows/sar-*.yml'
      - '.github/workflows/workflow-sar-*.yml'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.kiro/**'
      - 'docs/**'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    uses: ./.github/workflows/workflow-build.yml