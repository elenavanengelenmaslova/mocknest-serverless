name: Feature Branch - AWS Build and Deploy

on:
  push:
    branches:
      - 'feature/*'
      - 'bugfix/*'  # Added bugfix branches
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  # Temporarily commented out test job to focus on deployment
  # test:
  #   uses: ./.github/workflows/workflow-build.yml

  deploy:
    # needs: test  # Removed dependency on test job
    uses: ./.github/workflows/workflow-deploy-aws.yml
    with:
      environment: default
      enable-ai: false
      aws-region: 'eu-west-1'
      github-actions-role-name: 'GitHubOIDCAdmin'  # Change this to your existing role name
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}