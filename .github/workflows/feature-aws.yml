name: CICD - Feature Branch AWS

on:
  push:
    branches:
      - 'feature/*'
      - 'bugfix/*'
      - 'dependabot/**'
    paths-ignore:
      - '**.md'
      - '.kiro/**'
      - 'docs/**'
      - '.github/workflows/sar-*.yml'
      - '.github/workflows/workflow-sar-*.yml'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.kiro/**'
      - 'docs/**'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    uses: ./.github/workflows/Reusable - Build.yml

  deploy:
    needs: test
    if: |
      contains(github.event.head_commit.modified, 'software/') ||
      contains(github.event.head_commit.modified, 'deployment/')
    uses: ./.github/workflows/Reusable - Deploy AWS.yml
    with:
      environment: default
      aws-region: 'eu-west-1'
      github-actions-role-name: 'GitHubOIDCAdmin'  # Change this to your existing role name
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}