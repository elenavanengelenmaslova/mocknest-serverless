name: Feature Branch - AWS Build and Deploy

on:
  push:
    branches:
      - 'feature/*'
    paths-ignore:
      - '**.md'
      - '.kiro/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.kiro/**'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    uses: ./.github/workflows/workflow-build.yml

  deploy:
    needs: test
    uses: ./.github/workflows/workflow-deploy-aws.yml
    with:
      environment: default
      aws-region: 'eu-west-1'
      github-actions-role-name: 'GitHubOIDCAdmin'  # Change this to your existing role name
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}