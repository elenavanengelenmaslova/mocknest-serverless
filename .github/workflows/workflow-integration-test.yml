  test-soap:
    name: SOAP Generation and Import
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ success() && (inputs.test-suite == 'all' || inputs.test-suite == 'soap' || inputs.test-suite == '') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
