          if [ -z "$API_URL" ]; then
            echo "ERROR: Failed to retrieve MockNestApiUrl"
            exit 1
          fi

          if [ "$AUTH_MODE" = "API_KEY" ]; then
            API_KEY_ID=$(aws cloudformation describe-stacks \
