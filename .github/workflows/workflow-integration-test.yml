name: Reusable - Integration Tests

on:
  workflow_call:
    inputs:
      aws-region:
        required: false
        type: string
        default: 'eu-west-1'
        description: 'AWS region where the stack is deployed'
      github-actions-role-name:
        required: false
        type: string
        default: 'GitHubActionsRole'
        description: 'Name of the GitHub Actions OIDC role'
      test-suite:
        required: false
        type: string
        default: 'all'
        description: 'Test suite to run (all, rest, graphql, soap)'
    secrets:
      AWS_ACCOUNT_ID:
        required: true
  workflow_dispatch:
    inputs:
      aws-region:
        description: 'AWS region where the stack is deployed'
        required: false
        type: string
        default: 'eu-west-1'
      github-actions-role-name:
        description: 'Name of the GitHub Actions OIDC role'
        required: false
        type: string
        default: 'GitHubActionsRole'
      test-suite:
        description: 'Test suite to run'
        required: false
        type: choice
        options:
          - all
          - rest
          - graphql
          - soap
        default: 'all'

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: Setup and Health Checks
    runs-on: ubuntu-latest
    outputs:
      api-url: ${{ steps.stack-outputs.outputs.api-url }}
      api-key-id: ${{ steps.stack-outputs.outputs.api-key-id }}
      auth-mode: ${{ steps.stack-outputs.outputs.auth-mode }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name }}
          aws-region: ${{ inputs.aws-region }}

      - name: Retrieve stack outputs
        id: stack-outputs
        run: |
          # Read stack name from samconfig.toml
          STACK_NAME=$(python3 - <<'PY'
          import tomllib
          cfg = tomllib.load(open("deployment/aws/sam/samconfig.toml", "rb"))
          print(cfg["default"]["global"]["parameters"]["stack_name"])
          PY
          )
          
          echo "Stack name: $STACK_NAME"
          
          # Retrieve stack outputs
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`MockNestApiUrl`].OutputValue' \
            --output text)

          AUTH_MODE=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`AuthMode`].OutputValue' \
            --output text 2>/dev/null || echo "API_KEY")
          
          # Validate API_URL
          if [ -z "$API_URL" ]; then
            echo "ERROR: Failed to retrieve MockNestApiUrl from stack outputs"
            exit 1
          fi
          if [[ ! "$API_URL" =~ ^https:// ]]; then
            echo "ERROR: API_URL must start with https://"
            exit 1
          fi
          API_URL="${API_URL%/}"
          
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "auth-mode=$AUTH_MODE" >> $GITHUB_OUTPUT

          if [ "$AUTH_MODE" = "API_KEY" ]; then
            API_KEY_ID=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query 'Stacks[0].Outputs[?OutputKey==`MockNestApiKey`].OutputValue' \
              --output text)
            if [ -z "$API_KEY_ID" ]; then
              echo "ERROR: MockNestApiKey output missing in API_KEY mode"
              exit 1
            fi
            echo "api-key-id=$API_KEY_ID" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  IAM mode: skipping API key output retrieval"
          fi

      - name: Retrieve API key value
        id: api-key
        if: steps.stack-outputs.outputs.auth-mode == 'API_KEY' || steps.stack-outputs.outputs.auth-mode == ''
        run: |
          API_KEY=$(aws apigateway get-api-key \
            --api-key "${{ steps.stack-outputs.outputs.api-key-id }}" \
            --include-value \
            --query 'value' \
            --output text)
          
          # Mask API key immediately (applies to logs)
          echo "::add-mask::$API_KEY"
          
          if [ -z "$API_KEY" ]; then
            echo "ERROR: Failed to retrieve API key value"
            exit 1
          fi
          
          echo "api-key=$API_KEY" >> $GITHUB_OUTPUT

      - name: Run health checks and cleanup
        env:
          API_URL: ${{ steps.stack-outputs.outputs.api-url }}
          API_KEY: ${{ steps.api-key.outputs.api-key }}
          AUTH_MODE: ${{ steps.stack-outputs.outputs.auth-mode }}
        run: |
          chmod +x scripts/post-deploy-test.sh
          ./scripts/post-deploy-test.sh setup

  test-rest:
    name: REST Generation and Import
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ success() && (inputs.test-suite == 'all' || inputs.test-suite == 'rest' || inputs.test-suite == '') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name }}
          aws-region: ${{ inputs.aws-region }}

      - name: Retrieve API key value
        id: api-key
        if: needs.setup.outputs.auth-mode == 'API_KEY' || needs.setup.outputs.auth-mode == ''
        run: |
          API_KEY=$(aws apigateway get-api-key \
            --api-key "${{ needs.setup.outputs.api-key-id }}" \
            --include-value \
            --query 'value' \
            --output text)
          
          # Mask API key immediately
          echo "::add-mask::$API_KEY"
          
          # Validate API key
          if [ -z "$API_KEY" ]; then
            echo "ERROR: Failed to retrieve API key value"
            exit 1
          fi
          
          echo "api-key=$API_KEY" >> $GITHUB_OUTPUT

      - name: Run REST tests
        env:
          API_URL: ${{ needs.setup.outputs.api-url }}
          API_KEY: ${{ steps.api-key.outputs.api-key }}
          AUTH_MODE: ${{ needs.setup.outputs.auth-mode }}
        run: |
          # Validate that setup job provided required outputs
          if [ -z "$API_URL" ]; then
            echo "ERROR: API_URL not available"
            exit 1
          fi
          if [ "${AUTH_MODE:-API_KEY}" = "API_KEY" ] && [ -z "$API_KEY" ]; then
            echo "ERROR: API_KEY not available in API_KEY mode"
            exit 1
          fi
          
          chmod +x scripts/post-deploy-test.sh
          ./scripts/post-deploy-test.sh rest

  test-graphql:
    name: GraphQL Generation and Import
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ success() && (inputs.test-suite == 'all' || inputs.test-suite == 'graphql' || inputs.test-suite == '') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name }}
          aws-region: ${{ inputs.aws-region }}

      - name: Retrieve API key value
        id: api-key
        if: needs.setup.outputs.auth-mode == 'API_KEY' || needs.setup.outputs.auth-mode == ''
        run: |
          API_KEY=$(aws apigateway get-api-key \
            --api-key "${{ needs.setup.outputs.api-key-id }}" \
            --include-value \
            --query 'value' \
            --output text)
          
          # Mask API key immediately
          echo "::add-mask::$API_KEY"
          
          # Validate API key
          if [ -z "$API_KEY" ]; then
            echo "ERROR: Failed to retrieve API key value"
            exit 1
          fi
          
          echo "api-key=$API_KEY" >> $GITHUB_OUTPUT

      - name: Run GraphQL tests
        env:
          API_URL: ${{ needs.setup.outputs.api-url }}
          API_KEY: ${{ steps.api-key.outputs.api-key }}
          AUTH_MODE: ${{ needs.setup.outputs.auth-mode }}
        run: |
          # Validate that setup job provided required outputs
          if [ -z "$API_URL" ]; then
            echo "ERROR: API_URL not available"
            exit 1
          fi
          if [ "${AUTH_MODE:-API_KEY}" = "API_KEY" ] && [ -z "$API_KEY" ]; then
            echo "ERROR: API_KEY not available in API_KEY mode"
            exit 1
          fi
          
          chmod +x scripts/post-deploy-test.sh
          ./scripts/post-deploy-test.sh graphql

  test-soap:
    name: SOAP Generation and Import
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ success() && (inputs.test-suite == 'all' || inputs.test-suite == 'soap' || inputs.test-suite == '') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name }}
          aws-region: ${{ inputs.aws-region }}

      - name: Retrieve API key value
        id: api-key
        if: needs.setup.outputs.auth-mode == 'API_KEY' || needs.setup.outputs.auth-mode == ''
        run: |
          API_KEY=$(aws apigateway get-api-key \
            --api-key "${{ needs.setup.outputs.api-key-id }}" \
            --include-value \
            --query 'value' \
            --output text)
          
          # Mask API key immediately
          echo "::add-mask::$API_KEY"
          
          # Validate API key
          if [ -z "$API_KEY" ]; then
            echo "ERROR: Failed to retrieve API key value"
            exit 1
          fi
          
          echo "api-key=$API_KEY" >> $GITHUB_OUTPUT

      - name: Run SOAP tests
        env:
          API_URL: ${{ needs.setup.outputs.api-url }}
          API_KEY: ${{ steps.api-key.outputs.api-key }}
          AUTH_MODE: ${{ needs.setup.outputs.auth-mode }}
        run: |
          # Validate that setup job provided required outputs
          if [ -z "$API_URL" ]; then
            echo "ERROR: API_URL not available"
            exit 1
          fi
          if [ "${AUTH_MODE:-API_KEY}" = "API_KEY" ] && [ -z "$API_KEY" ]; then
            echo "ERROR: API_KEY not available in API_KEY mode"
            exit 1
          fi
          
          chmod +x scripts/post-deploy-test.sh
          ./scripts/post-deploy-test.sh soap
