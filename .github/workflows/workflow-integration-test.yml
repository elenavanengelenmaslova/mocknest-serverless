name: Reusable - Integration Tests

on:
  workflow_call:
    inputs:
      aws-region:
        required: false
        type: string
        default: 'eu-west-1'
        description: 'AWS region where the stack is deployed'
      github-actions-role-name:
        required: false
        type: string
        default: 'GitHubActionsRole'
        description: 'Name of the GitHub Actions OIDC role'
      stack-name:
        required: false
        type: string
        default: ''
        description: 'CloudFormation stack name override (defaults to value in samconfig.toml)'
      test-suite:
        required: false
        type: string
        default: 'all'
        description: 'Test suite to run (all, rest, graphql, soap, webhook)'
    secrets:
      AWS_ACCOUNT_ID:
        required: true
  workflow_dispatch:
    inputs:
      aws-region:
        description: 'AWS region where the stack is deployed'
        required: false
        type: string
        default: 'eu-west-1'
      github-actions-role-name:
        description: 'Name of the GitHub Actions OIDC role'
        required: false
        type: string
        default: 'GitHubActionsRole'
      test-suite:
        description: 'Test suite to run'
        required: false
        type: choice
        options:
          - all
          - rest
          - graphql
          - soap
          - webhook
        default: 'all'

permissions:
  id-token: write
  contents: read

# Shared helper used by every job to resolve stack name, API_URL, API_KEY, AUTH_MODE
# and export them as masked env vars before running the test script.
# Usage: source this block inside a run step (it is inlined per job below).

jobs:
  setup:
    name: Setup and Health Checks
    runs-on: ubuntu-latest
    outputs:
      stack-name: ${{ steps.stack-name.outputs.stack-name }}
      auth-mode: ${{ steps.stack-name.outputs.auth-mode }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name }}
          aws-region: ${{ inputs.aws-region }}

      - name: Resolve stack name and auth mode
        id: stack-name
        run: |
          STACK_NAME_OVERRIDE="${{ inputs.stack-name }}"
          if [ -n "$STACK_NAME_OVERRIDE" ]; then
            STACK_NAME="$STACK_NAME_OVERRIDE"
          else
            STACK_NAME=$(python3 - <<'PY'
          import tomllib
          cfg = tomllib.load(open("deployment/aws/sam/samconfig.toml", "rb"))
          print(cfg["default"]["global"]["parameters"]["stack_name"])
          PY
            )
          fi
          AUTH_MODE=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`AuthMode`].OutputValue' \
            --output text 2>/dev/null || echo "API_KEY")
          echo "stack-name=$STACK_NAME" >> "$GITHUB_OUTPUT"
          echo "auth-mode=${AUTH_MODE:-API_KEY}" >> "$GITHUB_OUTPUT"

      - name: Run health checks and cleanup
        run: |
          STACK_NAME="${{ steps.stack-name.outputs.stack-name }}"
          AUTH_MODE="${{ steps.stack-name.outputs.auth-mode }}"

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`MockNestApiUrl`].OutputValue' \
            --output text)
          API_URL="${API_URL%/}"
          echo "::add-mask::$API_URL"

          if [ -z "$API_URL" ]; then
            echo "ERROR: Failed to retrieve MockNestApiUrl"
            exit 1
          fi

          if [ "$AUTH_MODE" = "API_KEY" ]; then
            API_KEY_ID=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query 'Stacks[0].Outputs[?OutputKey==`MockNestApiKey`].OutputValue' \
              --output text)
            API_KEY=$(aws apigateway get-api-key \
              --api-key "$API_KEY_ID" \
              --include-value \
              --query 'value' \
              --output text)
            echo "::add-mask::$API_KEY"
            if [ -z "$API_KEY" ]; then
              echo "ERROR: Failed to retrieve API key value"
              exit 1
            fi
          fi

          export API_URL API_KEY AUTH_MODE
          chmod +x scripts/post-deploy-test.sh
          ./scripts/post-deploy-test.sh setup

  test-rest:
    name: REST Generation and Import
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ success() && (inputs.test-suite == 'all' || inputs.test-suite == 'rest' || inputs.test-suite == '') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
