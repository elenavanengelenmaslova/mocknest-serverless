  test-webhook:
    name: Webhook Delivery
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ success() && (inputs.test-suite == 'all' || inputs.test-suite == 'webhook') && needs.setup.outputs.auth-mode == 'IAM' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name }}
          aws-region: ${{ inputs.aws-region }}

      - name: Run webhook tests
        run: |
          STACK_NAME="${{ needs.setup.outputs.stack-name }}"
          AUTH_MODE="${{ needs.setup.outputs.auth-mode }}"

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`MockNestApiUrl`].OutputValue' \
            --output text)
          API_URL="${API_URL%/}"
          echo "::add-mask::$API_URL"

          if [ -z "$API_URL" ]; then
            echo "ERROR: Failed to retrieve MockNestApiUrl"
            exit 1
          fi

          MOCK_STORAGE_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`MockStorageBucket`].OutputValue' \
            --output text)

          export API_URL AUTH_MODE STACK_NAME MOCK_STORAGE_BUCKET
          chmod +x scripts/post-deploy-test.sh
          ./scripts/post-deploy-test.sh webhook
