name: Reusable - Integration Tests

on:
  workflow_call:
    inputs:
      aws-region:
        required: false
        type: string
        default: 'eu-west-1'
        description: 'AWS region where the stack is deployed'
      github-actions-role-name:
        required: false
        type: string
        default: 'GitHubActionsRole'
        description: 'Name of the GitHub Actions OIDC role'
    secrets:
      AWS_ACCOUNT_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name }}
          aws-region: ${{ inputs.aws-region }}

      - name: Retrieve stack outputs
        id: stack-outputs
        run: |
          # Read stack name from samconfig.toml
          STACK_NAME=$(python3 - <<'PY'
          import tomllib
          cfg = tomllib.load(open("deployment/aws/sam/samconfig.toml", "rb"))
          print(cfg["default"]["global"]["parameters"]["stack_name"])
          PY
          )
          
          echo "Stack name: $STACK_NAME"
          
          # Retrieve stack outputs
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`MockNestApiUrl`].OutputValue' \
            --output text)
          
          API_KEY_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`MockNestApiKey`].OutputValue' \
            --output text)
          
          # Validate outputs
          if [ -z "$API_URL" ] || [ -z "$API_KEY_ID" ]; then
            echo "ERROR: Failed to retrieve required stack outputs"
            exit 1
          fi
          
          # Validate API_URL format
          if [[ ! "$API_URL" =~ ^https:// ]]; then
            echo "ERROR: API_URL must start with https://"
            exit 1
          fi
          
          # Remove trailing slash
          API_URL="${API_URL%/}"
          
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "api-key-id=$API_KEY_ID" >> $GITHUB_OUTPUT

      - name: Retrieve API key value
        id: api-key
        run: |
          API_KEY=$(aws apigateway get-api-key \
            --api-key "${{ steps.stack-outputs.outputs.api-key-id }}" \
            --include-value \
            --query 'value' \
            --output text)
          
          # Mask API key immediately
          echo "::add-mask::$API_KEY"
          
          # Validate API key
          if [ -z "$API_KEY" ]; then
            echo "ERROR: Failed to retrieve API key value"
            exit 1
          fi
          
          echo "api-key=$API_KEY" >> $GITHUB_OUTPUT

      - name: Run integration tests
        id: run-tests
        continue-on-error: true
        env:
          API_URL: ${{ steps.stack-outputs.outputs.api-url }}
          API_KEY: ${{ steps.api-key.outputs.api-key }}
        run: |
          chmod +x scripts/post-deploy-test.sh
          ./scripts/post-deploy-test.sh

      - name: Create test summary
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## 🧪 Post-Deployment Integration Tests
          
          **Status**: ✅ All tests passed
          
          **Deployment Details**:
          - **API URL**: ${{ steps.stack-outputs.outputs.api-url }}
          - **Region**: ${{ inputs.aws-region }}
          
          **Tests Executed**:
          - ✅ Runtime health check
          - ✅ AI generation health check
          
          **Next Steps**:
          - Deployment is production-ready
          - All API endpoints are functional
          EOF
          else
            cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## 🧪 Post-Deployment Integration Tests
          
          **Status**: ❌ Tests failed
          
          **Deployment Details**:
          - **API URL**: ${{ steps.stack-outputs.outputs.api-url }}
          - **Region**: ${{ inputs.aws-region }}
          
          **Action Required**:
          - Review test logs for details
          - Check Lambda function logs in CloudWatch
          - Verify API Gateway configuration
          EOF
            exit 1
          fi
