name: Reusable - Build

on:
  workflow_call:
    inputs:
      aws-region:
        description: 'AWS region for SAM template validation'
        required: false
        type: string
        default: 'eu-west-1'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
          
      - name: Run tests with coverage
        run: ./gradlew test koverHtmlReport koverXmlReport koverVerify
        
      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: build/reports/kover/html/

      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/kover/report.xml
          fail_ci_if_error: false

  validate-sam:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v3

      - name: Validate SAM template
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws-region }}
        run: sam validate --template-file deployment/aws/sam/template.yaml --region ${{ inputs.aws-region }}
