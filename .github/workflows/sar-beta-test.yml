name: SAR Beta Test (Private)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Beta version for private SAR (e.g., 0.2.0-beta.1)'
        required: true
        type: string
      test-account-ids:
        description: 'Comma-separated test AWS account IDs for private sharing'
        required: true
        type: string
      github-actions-role-name:
        description: 'GitHub Actions OIDC role name'
        required: false
        default: 'GitHubOIDCAdmin'
        type: string

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

env:
  SAR_PUBLISH_REGION: us-east-1  # AWS SAR requirement for public apps

jobs:
  publish:
    uses: ./.github/workflows/workflow-sar-publish.yml
    with:
      version: ${{ inputs.version }}
      aws-region: us-east-1
      s3-prefix: 'private-sar/${{ inputs.version }}'
      github-actions-role-name: ${{ inputs.github-actions-role-name }}
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  
  verify:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## 🚀 SAR Private Beta Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** us-east-1" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to AWS Console → Serverless Application Repository" >> $GITHUB_STEP_SUMMARY
          echo "2. Find 'MockNest-Serverless' in Available Applications → Private" >> $GITHUB_STEP_SUMMARY
          echo "3. Click Deploy and test manually" >> $GITHUB_STEP_SUMMARY
          echo "4. If tests pass, run 'SAR Release (Public)' workflow" >> $GITHUB_STEP_SUMMARY
