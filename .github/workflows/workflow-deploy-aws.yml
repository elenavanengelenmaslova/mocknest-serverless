name: Reusable AWS Build and Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Deployment environment (default, staging, or production)'
      aws-region:
        required: false
        type: string
        default: 'eu-west-1'
        description: 'AWS region for deployment'
      github-actions-role-name:
        required: false
        type: string
        default: 'GitHubActionsRole'
        description: 'Name of the GitHub Actions OIDC role'
    secrets:
      AWS_ACCOUNT_ID:
        required: true

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
          
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name }}
          role-session-name: MockNestServerlessDeployment
          aws-region: ${{ inputs.aws-region }}
          
      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        
      - name: Build Lambda JARs
        run: |
          ./gradlew clean :software:infra:aws:runtime:shadowJar :software:infra:aws:generation:shadowJar --no-build-cache
          echo "Build completed, checking JAR files:"
          ls -lh build/dist/ || echo "No build/dist directory found"
          
      - name: Verify JAR artifacts
        run: |
          if [ ! -f "build/dist/mocknest-runtime.jar" ]; then
            echo "ERROR: mocknest-runtime.jar not found"
            exit 1
          fi
          if [ ! -f "build/dist/mocknest-generation.jar" ]; then
            echo "ERROR: mocknest-generation.jar not found"
            exit 1
          fi
          echo "✓ Runtime JAR: $(du -h build/dist/mocknest-runtime.jar | cut -f1)"
          echo "✓ Generation JAR: $(du -h build/dist/mocknest-generation.jar | cut -f1)"
  
      - name: Deploy with SAM
        run: |
          cd deployment/aws/sam
          echo "🚀 Starting SAM deployment..."
          
          # Deploy directly without sam build since JARs are pre-built
          if sam deploy --config-env default --no-confirm-changeset --force-upload; then
            echo "✅ Deployment completed successfully"
          else
            EXIT_CODE=$?
            echo "❌ SAM deployment failed with exit code: $EXIT_CODE"
            echo "💥 Deployment failed with errors - check logs above"
            exit $EXIT_CODE
          fi

      - name: Get deployment outputs
        id: outputs
        run: |
          cd deployment/aws/sam
          ENV="default"

          # Read stack_name from samconfig.toml for the default environment
          STACK_NAME=$(python - "$ENV" <<'PY'
          import sys, tomllib
          env = sys.argv[1]
          cfg = tomllib.load(open("samconfig.toml", "rb"))
          print(cfg[env]["global"]["parameters"]["stack_name"])
          PY
          )

          echo "Resolved stack name: $STACK_NAME"

          # Get stack outputs
          API_URL=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].Outputs[?OutputKey==`MockNestApiUrl`].OutputValue' --output text)
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].Outputs[?OutputKey==`MockStorageBucket`].OutputValue' --output text)

          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "bucket-name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "stack-name=$STACK_NAME" >> $GITHUB_OUTPUT
               
      - name: Create deployment summary
        run: |
          echo "## 🚀 MockNest Serverless Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ inputs.aws-region }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Stack Name:** ${{ steps.outputs.outputs.stack-name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API URL:** ${{ steps.outputs.outputs.api-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Storage Bucket:** ${{ steps.outputs.outputs.bucket-name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔑 API Access" >> $GITHUB_STEP_SUMMARY
          echo "No API key required for testing (disabled for initial deployment)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📚 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Test the API: \`GET ${{ steps.outputs.outputs.api-url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Test admin API: \`GET ${{ steps.outputs.outputs.api-url }}__admin/mappings\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Import the Postman collection from \`docs/postman/\` for testing" >> $GITHUB_STEP_SUMMARY