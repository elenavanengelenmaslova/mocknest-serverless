name: CD - SAR Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for SAR (e.g., 1.0.0 or 0.2.0-beta.1)'
        required: true
        type: string
      aws-region:
        description: 'AWS region for SAR publishing'
        required: false
        default: 'eu-west-1'
        type: string
      github-actions-role-name:
        description: 'GitHub Actions OIDC role name'
        required: false
        default: 'GitHubOIDCAdmin'
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/workflow-sar-publish.yml
    with:
      version: ${{ inputs.version || github.event.release.tag_name }}
      aws-region: ${{ inputs.aws-region || 'eu-west-1' }}
      github-actions-role-name: ${{ inputs.github-actions-role-name || 'GitHubOIDCAdmin' }}
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  
  test-api-key:
    needs: publish
    uses: ./.github/workflows/sar-test-pipeline.yml
    with:
      aws-region: ${{ inputs.aws-region || 'eu-west-1' }}
      version: ${{ inputs.version || github.event.release.tag_name }}
      auth-mode: 'API_KEY'
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

  test-iam:
    needs: publish
    uses: ./.github/workflows/sar-test-pipeline.yml
    with:
      aws-region: ${{ inputs.aws-region || 'eu-west-1' }}
      version: ${{ inputs.version || github.event.release.tag_name }}
      auth-mode: 'IAM'
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

  summary:
    needs: [publish, test-api-key, test-iam]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create deployment summary
        run: |
          echo "## 📦 SAR Application Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version || github.event.release.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ inputs.aws-region || 'eu-west-1' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Application ID:** ${{ needs.publish.outputs.application_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Include test pipeline status for both runs
          echo "### 🧪 Test Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Auth Mode | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.test-api-key.result }}" = "success" ]; then
            echo "| API_KEY | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-api-key.result }}" = "failure" ]; then
            echo "| API_KEY | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-api-key.result }}" = "cancelled" ]; then
            echo "| API_KEY | ⏭️ Cancelled |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| API_KEY | ⚠️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test-iam.result }}" = "success" ]; then
            echo "| IAM | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-iam.result }}" = "failure" ]; then
            echo "| IAM | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-iam.result }}" = "cancelled" ]; then
            echo "| IAM | ⏭️ Cancelled |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| IAM | ⚠️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall release status
          if [ "${{ needs.test-api-key.result }}" = "failure" ] || [ "${{ needs.test-iam.result }}" = "failure" ]; then
            echo "**Overall Release Status:** ❌ Failed — one or more validation runs failed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-api-key.result }}" = "success" ] && [ "${{ needs.test-iam.result }}" = "success" ]; then
            echo "**Overall Release Status:** ✅ All validation runs passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Overall Release Status:** ⚠️ Incomplete — one or more validation runs were cancelled or skipped" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View detailed test results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🎯 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to [AWS Serverless Application Repository](https://console.aws.amazon.com/serverlessrepo/home)" >> $GITHUB_STEP_SUMMARY
          echo "2. Find 'MockNest-Serverless' in your applications" >> $GITHUB_STEP_SUMMARY
          echo "3. Test deployment in your account" >> $GITHUB_STEP_SUMMARY
          echo "4. When ready, click 'Make public' to allow others to deploy it" >> $GITHUB_STEP_SUMMARY
          echo "5. Repeat for other regions if needed" >> $GITHUB_STEP_SUMMARY
