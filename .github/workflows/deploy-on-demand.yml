name: CD - Deploy On Demand

on:
  workflow_dispatch:
    inputs:
      auth-mode:
        description: 'Authentication mode for API Gateway'
        required: false
        default: 'API_KEY'
        type: choice
        options:
          - API_KEY
          - IAM
      stack-name:
        description: 'CloudFormation stack name (leave empty to use default from samconfig.toml)'
        required: false
        default: ''
        type: string
      aws-region:
        description: 'AWS region for deployment'
        required: false
        default: 'eu-west-1'
        type: string
      github-actions-role-name:
        description: 'GitHub Actions OIDC role name'
        required: false
        default: 'GitHubOIDCAdmin'
        type: string
      runtime-lambda-memory:
        description: 'Runtime Lambda memory in MB (512-10240). Use 1536+ for 500+ mocks.'
        required: false
        default: '1536'
        type: choice
        options:
          - '512'
          - '1024'
          - '1536'
          - '2048'
          - '3072'
      run-extensive-tests:
        description: 'Run extensive API tests after standard tests pass (covers all remaining MockNest APIs)'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  test:
    uses: ./.github/workflows/workflow-build.yml

  deploy-on-demand:
    needs: test
    uses: ./.github/workflows/workflow-deploy-aws.yml
    with:
      environment: default
      aws-region: ${{ inputs.aws-region }}
      github-actions-role-name: ${{ inputs.github-actions-role-name }}
      stack-name: ${{ inputs.stack-name }}
      auth-mode: ${{ inputs.auth-mode }}
      runtime-lambda-memory: ${{ fromJSON(inputs.runtime-lambda-memory) }}
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

  integration-tests:
    needs: deploy-on-demand
    uses: ./.github/workflows/workflow-integration-test.yml
    with:
      aws-region: ${{ inputs.aws-region }}
      github-actions-role-name: ${{ inputs.github-actions-role-name }}
      stack-name: ${{ inputs.stack-name }}
      # API_KEY mode: run all existing tests (rest, graphql, soap)
      # IAM mode: run only the webhook test
      test-suite: ${{ inputs.auth-mode == 'IAM' && 'webhook' || 'all' }}
      run-extensive-tests: ${{ inputs.run-extensive-tests }}
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
