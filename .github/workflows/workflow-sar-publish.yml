name: Reusable SAR Package and Publish

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'Semantic version for SAR publication'
      aws-region:
        required: false
        type: string
        default: 'us-east-1'
        description: 'AWS region for SAR publishing'
      bucket-name:
        required: false
        type: string
        default: ''
        description: 'S3 bucket name (auto-generated if empty)'
      s3-prefix:
        required: false
        type: string
        default: ''
        description: 'S3 prefix for artifacts (optional)'
      github-actions-role-name:
        required: false
        type: string
        default: 'GitHubOIDCAdmin'
        description: 'Name of the GitHub Actions OIDC role'
    secrets:
      AWS_ACCOUNT_ID:
        required: true
    outputs:
      application-id:
        description: 'SAR application ID'
        value: ${{ jobs.publish.outputs.application-id }}

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      application-id: ${{ steps.publish.outputs.application-id }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
          
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.github-actions-role-name }}
          role-session-name: MockNestSARPublishing
          aws-region: ${{ inputs.aws-region }}
          
      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        
      - name: Build application
        run: |
          echo "🔨 Building MockNest Serverless..."
          ./gradlew clean :software:infra:aws:runtime:shadowJar :software:infra:aws:generation:shadowJar --no-build-cache
          echo "✅ Build completed successfully"
          
      - name: Verify JAR artifacts
        run: |
          if [ ! -f "build/dist/mocknest-runtime.jar" ]; then
            echo "ERROR: mocknest-runtime.jar not found"
            exit 1
          fi
          if [ ! -f "build/dist/mocknest-generation.jar" ]; then
            echo "ERROR: mocknest-generation.jar not found"
            exit 1
          fi
          echo "✓ Runtime JAR: $(du -h build/dist/mocknest-runtime.jar | cut -f1)"
          echo "✓ Generation JAR: $(du -h build/dist/mocknest-generation.jar | cut -f1)"
        
      - name: Package and publish to SAR
        id: publish
        run: |
          echo "📦 Packaging and publishing to SAR..."
          cd deployment/aws/sam
          
          # Determine bucket name
          if [ -z "${{ inputs.bucket-name }}" ]; then
            SAR_BUCKET="mocknest-sar-artifacts-${{ secrets.AWS_ACCOUNT_ID }}"
          else
            SAR_BUCKET="${{ inputs.bucket-name }}"
          fi
          
          # Create S3 bucket if it doesn't exist
          aws s3 mb s3://$SAR_BUCKET --region ${{ inputs.aws-region }} || echo "Bucket already exists"
          
          # Set bucket policy to allow SAR to read artifacts
          echo "🔐 Setting bucket policy for SAR access..."
          aws s3api put-bucket-policy --bucket $SAR_BUCKET --policy '{
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "serverlessrepo.amazonaws.com"
                },
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::'$SAR_BUCKET'/*"
              }
            ]
          }'
          
          # Package the application (JARs are pre-built by Gradle)
          if [ -z "${{ inputs.s3-prefix }}" ]; then
            sam package \
              --template-file template.yaml \
              --s3-bucket $SAR_BUCKET \
              --output-template-file packaged-template.yaml \
              --region ${{ inputs.aws-region }}
          else
            sam package \
              --template-file template.yaml \
              --s3-bucket $SAR_BUCKET \
              --s3-prefix "${{ inputs.s3-prefix }}" \
              --output-template-file packaged-template.yaml \
              --region ${{ inputs.aws-region }}
          fi
          
          # Publish to SAR
          echo "🚀 Publishing to SAR..."
          RESULT=$(sam publish \
            --template packaged-template.yaml \
            --region ${{ inputs.aws-region }} \
            --semantic-version ${{ inputs.version }})
          
          # Extract application ID from output
          APP_ID=$(echo "$RESULT" | grep -o 'arn:aws:serverlessrepo:[^:]*:[^:]*:applications/[^"]*' | head -1)
          echo "application-id=$APP_ID" >> $GITHUB_OUTPUT
          echo "📦 Published SAR application: $APP_ID"
