# CodeRabbit Configuration for MockNest Serverless
# Documentation: https://docs.coderabbit.ai/guides/configure-coderabbit

# Language and frameworks
language: kotlin
frameworks:
  - spring-boot
  - aws-lambda
  - gradle

# Review settings
reviews:
  # Enable automatic reviews on PRs
  auto_review:
    enabled: true
    # Review draft PRs
    drafts: true
  
  # Enable inline comments
  inline_comments: true
  
  # Request changes for critical issues
  request_changes_workflow: true
  
  # Auto-approve PRs that meet criteria
  auto_approve:
    enabled: true
    # Conditions for auto-approval
    conditions:
      # Approve if no critical or high severity issues found
      - no_critical_issues: true
      # Approve if all tests pass
      - all_checks_pass: true
      # Approve documentation-only changes
      - documentation_only: true
      # Approve dependency updates from trusted sources
      - dependency_updates: true
    # Don't auto-approve these types of changes
    exclude:
      # Never auto-approve changes to security-sensitive files
      - "deployment/aws/shared/github-oidc-role.yaml"
      - "deployment/aws/sam/template.yaml"
      - "**/IAM*.yaml"
      # Never auto-approve changes to core domain logic without human review
      - "software/domain/**"
      # Never auto-approve changes to Lambda handlers
      - "software/infra/aws/**/Lambda*.kt"
  
  # Review scope
  scope:
    - "software/**/*.kt"
    - "software/**/*.kts"
    - "deployment/**/*.yaml"
    - "deployment/**/*.sh"
    - "*.gradle.kts"
    - "*.md"
  
  # Exclude patterns
  exclude:
    - "build/**"
    - ".gradle/**"
    - "**/build/**"
    - "**/*.jar"
    - "**/*.class"

# Enable automatic PR creation for suggested fixes
auto_reply:
  enabled: true
  
# Enable learning from your codebase
learning:
  enabled: true

# Custom instructions for CodeRabbit
instructions:
  - "Follow Kotlin coding conventions and idiomatic patterns"
  - "Ensure clean architecture boundaries are maintained (domain -> application -> infrastructure)"
  - "Check for proper error handling using runCatching and kotlin-logging"
  - "Verify AWS SDK usage follows best practices"
  - "Ensure tests follow Given-When-Then naming convention"
  - "Check for proper resource management with .use { } blocks"
  - "Verify null safety and avoid !! operator"
  - "Ensure logging includes proper context information"
  - "Check that new code has appropriate test coverage"
  - "Verify SAM template changes are valid CloudFormation"

# Path-specific instructions
path_instructions:
  - path: "software/domain/**"
    instructions:
      - "Ensure no infrastructure dependencies"
      - "Domain models should be pure Kotlin with no framework dependencies"
  
  - path: "software/application/**"
    instructions:
      - "Use cases should depend only on domain and application interfaces"
      - "No direct AWS SDK usage - use interfaces instead"
  
  - path: "software/infra/aws/**"
    instructions:
      - "AWS-specific code only in this layer"
      - "Use Kotlin AWS SDK, not Java SDK"
      - "Ensure proper IAM permissions are documented"
  
  - path: "**/test/**"
    instructions:
      - "Follow unit testing standards from steering documents"
      - "Use MockK with relaxed mocks"
      - "Ensure Given-When-Then test naming"
      - "Use suspend test functions where appropriate"

# Chat settings
chat:
  # Enable chat for questions about the codebase
  enabled: true
  
# Tone and style
tone_instructions: |
  Be concise and technical. Focus on code quality, maintainability, and adherence to 
  clean architecture principles. Highlight security issues and AWS best practices.
  Use a collaborative tone and explain the reasoning behind suggestions.
