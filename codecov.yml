codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 90%
        threshold: 1%
    patch:
      default:
        target: 80%

# Ignore test files and build artifacts from coverage display
ignore:
  - "**/test/**/*"
  - "**/*Test.kt"
  - "**/build/**/*"
  - "deployment/**/*"
  - "**/*Interface.kt"
  - "**/interfaces/**/*"

# Ensure only the root aggregated report is used
parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no
